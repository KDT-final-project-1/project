<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
</head>
<body>
<div layout:fragment="Content">

	<style>
        .project-container {
            max-width: 1400px; /* 너무 퍼지지 않게 적정 최대 폭 제한 */
            margin: 0 auto;    /* 중앙 정렬 */
            padding: 30px 20px;
        }
        .form-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-line-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            background-color: #fff;
            transition: border-color 0.2s;
        }
        .form-line-control:focus {
            outline: none;
            border-color: #4A90E2;
        }
        .form-box-control {
            width: 100%;
            height: 480px; /* 실제 넓은 화면 비율에 맞게 높이감 있게 조정 */
            padding: 15px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            resize: none;
        }
        .module-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            background-color: #fff;
        }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px 20px;
        }
        .module-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #f5f5f5;
        }
        .module-item:last-child, .module-item:nth-last-child(2) {
            border-bottom: none;
        }
        .cursor-pointer {
            cursor: pointer;
        }
        .btn-register {
            background-color: #2F54EB;
            color: #fff;
            border: none;
            padding: 10px 32px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-register:hover {
            background-color: #1d39c4;
        }
    </style>

	<div class="project-container">
        <h2 style="font-weight: 700; margin-bottom: 35px; color: #111;">프로젝트</h2>

        <form th:action="@{/project/register}" method="post" id="projectForm">
            <div class="row g-5">
                <div class="col-xl-8 col-lg-7">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="form-section-title">제목</div>
                            <input type="text" class="form-line-control" id="projectName" name="projectName" placeholder="Value" required>
                        </div>
                        <div class="col-md-6">
                            <div class="form-section-title">식별자</div>
                            <input type="text" class="form-line-control" id="identifier" name="identifier" placeholder="Value" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="form-section-title">설명</div>
                        <textarea class="form-box-control" id="description" name="description" placeholder="Value"></textarea>
                    </div>
                </div>

                <div class="col-xl-4 col-lg-5">
                    <div class="mb-4">
                        <div class="form-section-title">홈페이지 URL</div>
                        <input type="url" class="form-line-control" id="projectUrl" name="projectUrl" placeholder="Value">
                    </div>

                    <div class="mb-4">
                        <div class="form-section-title">모듈</div>
                        <div class="module-card">
                            <div class="module-grid">
                                <div class="module-item">
                                    <label for="m1" class="m-0 cursor-pointer">일감관리</label>
                                    <input type="checkbox" name="moduleCodes" value="M001" id="m1">
                                </div>
                                <div class="module-item">
                                    <label for="m2" class="m-0 cursor-pointer">문서</label>
                                    <input type="checkbox" name="moduleCodes" value="M002" id="m2">
                                </div>
                                <div class="module-item">
                                    <label for="m3" class="m-0 cursor-pointer">파일</label>
                                    <input type="checkbox" name="moduleCodes" value="M003" id="m3">
                                </div>
                                <div class="module-item">
                                    <label for="m4" class="m-0 cursor-pointer">위키</label>
                                    <input type="checkbox" name="moduleCodes" value="M004" id="m4">
                                </div>
                                <div class="module-item">
                                    <label for="m5" class="m-0 cursor-pointer">저장소</label>
                                    <input type="checkbox" name="moduleCodes" value="M005" id="m5">
                                </div>
                                <div class="module-item">
                                    <label for="m6" class="m-0 cursor-pointer">게시판</label>
                                    <input type="checkbox" name="moduleCodes" value="M006" id="m6">
                                </div>
                                <div class="module-item">
                                    <label for="m7" class="m-0 cursor-pointer">달력</label>
                                    <input type="checkbox" name="moduleCodes" value="M007" id="m7">
                                </div>
                                <div class="module-item">
                                    <label for="m8" class="m-0 cursor-pointer">간트차트</label>
                                    <input type="checkbox" name="moduleCodes" value="M008" id="m8">
                                </div>
                                <div class="module-item">
                                    <label for="m9" class="m-0 cursor-pointer">칸반</label>
                                    <input type="checkbox" name="moduleCodes" value="M009" id="m9">
                                </div>
                                <div class="module-item">
                                    <label for="m10" class="m-0 cursor-pointer">로드맵</label>
                                    <input type="checkbox" name="moduleCodes" value="M010" id="m10">
                                </div>
                                <div class="module-item">
                                    <label for="m11" class="m-0 cursor-pointer">마일스톤</label>
                                    <input type="checkbox" name="moduleCodes" value="M011" id="m11">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-6">
                            <div class="form-section-title">시작일</div>
                            <input type="date" class="form-line-control" id="startDate" name="startDate">
                        </div>
                        <div class="col-6">
                            <div class="form-section-title">완료일</div>
                            <input type="date" class="form-line-control" id="endDate" name="endDate">
                        </div>
                    </div>

                    <div class="text-end mt-5">
                        <button type="submit" class="btn-register">등록</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</body>

</html>
