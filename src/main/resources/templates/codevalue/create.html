<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8">
<title>새 코드값 생성</title>
</head>

<body>
	<div layout:fragment="Content">

		<div class="single-pro-review-area mt-t-30 mg-b-15">
			<div class="container-fluid">

				<div class="row">
					<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
						<div class="product-payment-inner-st">

							<div class="review-content-section">
								<div class="row">
									<div class="col-lg-8 col-md-10 col-sm-12 col-xs-12">

										<div class="sparkline8-list">

											<div class="sparkline8-hd">
												<div class="main-sparkline8-hd">
													<h1>새 코드값 생성</h1>
													<p>
														<span
															th:text="${groupNameMap.get(codeValue.settingGroupName)}">그룹명</span>
														그룹에 새 코드값을 등록합니다.
													</p>
												</div>
											</div>

											<div class="sparkline8-graph">

												<div th:if="${errorMessage}" class="alert alert-danger"
													th:text="${errorMessage}"></div>

												<form th:action="@{/codevalue/create}"
													th:object="${codeValue}" method="post">

													<input type="hidden" th:field="*{settingGroupName}">

													<div class="form-group">
														<label>그룹</label> <input type="text" class="form-control"
															th:value="${groupNameMap.get(codeValue.settingGroupName)}"
															readonly>
													</div>

													<div class="form-group">
														<label>이름</label> <input type="text" class="form-control"
															th:field="*{settingName}" placeholder="코드값 이름을 입력하세요"
															required>
													</div>

													<div class="form-group">
														<label> <input type="checkbox" name="defaultYn"
															value="Y" th:checked="${codeValue.defaultYn == 'Y'}">
															기본값으로 설정
														</label>
														<p class="help-block">기본값은 그룹별로 하나만 설정할 수 있습니다.</p>
													</div>

													<div class="form-group text-right">
														<a th:href="@{/codevalue/list}"
															class="btn btn-custon-four btn-default"> 취소 </a>

														<button type="submit"
															class="btn btn-custon-four btn-primary">등록</button>
													</div>

												</form>

											</div>

										</div>

									</div>
								</div>
							</div>

						</div>
					</div>
				</div>

			</div>
		</div>

	</div>
</body>
</html>
